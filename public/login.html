<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Club Médanos Verdes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            position: relative;
            overflow-x: hidden;
        }

        /* Animación de fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(45, 98, 25, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(5, 150, 105, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100vh;
            z-index: 2;
            position: relative;
        }

        /* LEFT PANEL */
        .login-left {
            background: linear-gradient(135deg, #2d6219 0%, #4a8c2a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.1); }
        }

        .logo-brand {
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
            animation: slideInDown 0.8s ease-out;
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-brand img {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-brand h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .logo-brand p {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            position: relative;
            z-index: 2;
        }

        .feature-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            animation: slideInUp 0.6s ease-out both;
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.2s; }
        .feature-item:nth-child(3) { animation-delay: 0.3s; }
        .feature-item:nth-child(4) { animation-delay: 0.4s; }
        .feature-item:nth-child(5) { animation-delay: 0.5s; }
        .feature-item:nth-child(6) { animation-delay: 0.6s; }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feature-item:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-5px);
        }

        .feature-item .icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }

        .feature-item .text {
            font-size: 12px;
            font-weight: 500;
        }

        /* RIGHT PANEL */
        .login-right {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        .login-right::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(45deg, transparent 30%, rgba(45, 98, 25, 0.05) 50%, transparent 70%),
                linear-gradient(-45deg, transparent 30%, rgba(5, 150, 105, 0.05) 50%, transparent 70%);
            pointer-events: none;
            animation: shimmer 8s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .login-form {
            width: 100%;
            max-width: 380px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 48px;
            position: relative;
            z-index: 2;
            animation: slideInRight 0.8s ease-out;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-title {
            font-size: 26px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 22px;
            animation: fadeIn 0.6s ease-out backwards;
        }

        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: white;
            font-family: 'DM Sans';
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(45, 98, 25, 0.6);
            background: rgba(45, 98, 25, 0.15);
            box-shadow: 0 0 20px rgba(45, 98, 25, 0.2);
            transform: translateY(-2px);
        }

        .form-group.password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 34px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 18px;
            transition: all 0.2s ease;
            background: none;
            border: none;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #cbd5e1;
            transform: scale(1.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 32px;
        }

        .btn-submit {
            flex: 1;
            padding: 13px 16px;
            background: linear-gradient(135deg, #2d6219 0%, #4a8c2a 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans';
            font-size: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(45, 98, 25, 0.2);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(45, 98, 25, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #fca5a5;
            padding: 13px 15px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 968px) {
            .login-container { grid-template-columns: 1fr; }

            .login-left {
                min-height: 250px;
                padding: 30px 20px;
                justify-content: flex-start;
                padding-top: 40px;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-top: 30px;
            }

            .logo-brand { margin-bottom: 20px; }
            .logo-brand h1 { font-size: 24px; }
            .logo-brand img { width: 80px; height: 80px; }

            .login-right { padding: 30px 20px; }
            .login-form {
                max-width: 100%;
                padding: 40px 24px;
            }
        }

        @media (max-width: 600px) {
            .form-title { font-size: 22px; }
            .logo-brand p { font-size: 14px; }
            .login-form { padding: 32px 20px; }
            .features { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left Panel -->
        <div class="login-left">
            <div class="logo-brand">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='white' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='50' font-weight='bold' fill='%232d6219' text-anchor='middle'%3EMV%3C/text%3E%3C/svg%3E" alt="Logo">
                <h1>Club Médanos Verdes</h1>
                <p>Para todas las edades</p>
            </div>
            <div class="features">
                <div class="feature-item">
                    <div class="icon">👥</div>
                    <div class="text">Socios</div>
                </div>
                <div class="feature-item">
                    <div class="icon">🏊</div>
                    <div class="text">Actividades</div>
                </div>
                <div class="feature-item">
                    <div class="icon">🏋️</div>
                    <div class="text">Instructores</div>
                </div>
                <div class="feature-item">
                    <div class="icon">💳</div>
                    <div class="text">Cuotas</div>
                </div>
                <div class="feature-item">
                    <div class="icon">💰</div>
                    <div class="text">Caja</div>
                </div>
                <div class="feature-item">
                    <div class="icon">⚙️</div>
                    <div class="text">Admin</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="login-right">
            <div class="login-form">
                <div class="form-title">Ingresar</div>
                <div class="form-subtitle">Acceso al sistema de gestión</div>

                <div class="error-message" id="errorMsg"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                    </div>

                    <div class="form-group password-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit" id="submitBtn">Ingresar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    submitBtn.textContent = '✓ Ingresando...';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 400);
                } else {
                    errorMsg.textContent = data.error || 'Error al ingresar';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión: ' + err.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
