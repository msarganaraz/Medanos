<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Club Médanos Verdes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #0f172a; min-height: 100vh; display: flex; }

        .login-container { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100vh; }

        .login-left {
            background: linear-gradient(135deg, #2d6219 0%, #4a8c2a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .logo-brand { margin-bottom: 40px; }
        .logo-brand img { width: 100px; height: 100px; border-radius: 12px; margin-bottom: 20px; }
        .logo-brand h1 { font-size: 32px; font-weight: 700; margin-bottom: 5px; }
        .logo-brand p { font-size: 16px; opacity: 0.9; }

        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .feature-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); }
        .feature-item .icon { font-size: 24px; margin-bottom: 8px; }
        .feature-item .text { font-size: 12px; }

        .login-right {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-form {
            width: 100%;
            max-width: 350px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
        }

        .form-title { font-size: 24px; font-weight: 700; color: white; margin-bottom: 10px; }
        .form-subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #cbd5e1; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: 'DM Sans';
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2d6219;
            background: rgba(45, 98, 25, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 18px;
        }

        .form-group.password-group { position: relative; }

        .form-actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn-submit {
            flex: 1;
            padding: 12px;
            background: linear-gradient(90deg, #2d6219, #4a8c2a);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans';
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(45, 98, 25, 0.3); }
        .btn-submit:active { transform: translateY(0); }

        .error-message {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .loading { opacity: 0.6; cursor: not-allowed; }

        @media (max-width: 768px) {
            .login-container { grid-template-columns: 1fr; }
            .login-left { min-height: 200px; padding: 20px; }
            .features { grid-template-columns: 1fr; gap: 10px; }
            .logo-brand h1 { font-size: 24px; }
            .login-form { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left Panel -->
        <div class="login-left">
            <div class="logo-brand">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%232d6219' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='50' font-weight='bold' fill='white' text-anchor='middle'%3EMV%3C/text%3E%3C/svg%3E" alt="Logo">
                <h1>Club Médanos Verdes</h1>
                <p>Para todas las edades</p>
            </div>
            <div class="features">
                <div class="feature-item">
                    <div class="icon">👥</div>
                    <div class="text">Socios</div>
                </div>
                <div class="feature-item">
                    <div class="icon">🏊</div>
                    <div class="text">Actividades</div>
                </div>
                <div class="feature-item">
                    <div class="icon">🏋️</div>
                    <div class="text">Instructores</div>
                </div>
                <div class="feature-item">
                    <div class="icon">💳</div>
                    <div class="text">Cuotas</div>
                </div>
                <div class="feature-item">
                    <div class="icon">💰</div>
                    <div class="text">Caja</div>
                </div>
                <div class="feature-item">
                    <div class="icon">⚙️</div>
                    <div class="text">Admin</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="login-right">
            <div class="login-form">
                <div class="form-title">Ingresar</div>
                <div class="form-subtitle">Acceso al sistema de gestión</div>

                <div class="error-message" id="errorMsg"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                    </div>

                    <div class="form-group password-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <span class="password-toggle" onclick="togglePassword()">👁️</span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit" id="submitBtn">Ingresar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.error || 'Error al ingresar';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión: ' + err.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
